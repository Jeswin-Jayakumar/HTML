<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: aquamarine;
            color: darkslategrey;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        .hero-name {
            font-size: 60px;
            font-weight: bold;
            color: darkolivegreen;
            text-shadow: 3px 3px olivedrab;
        }
        .label {
            text-transform: uppercase;
            color: burlywood;
        }
        .power {
            font-weight: bold;
            color: chocolate;
        }
        .weakness {
            text-decoration: line-through;
            color: rosybrown;
        }
        .badge {
            font-size: 28px;
            font-weight: bold;
            color: indigo;
            transform: rotate(15deg);
        }
        .made-by {
            color: blue;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1 class="hero-name">Thunder Kid</h1>
    <p class="tagline">The most powerful hero in the school</p>

    <h2 class="label">Super powers</h2>
    <p class="power">Can run faster than a cheetah</p>
    <p class="power">Can lift a school bus</p>

    <h2 class="label">Weaknesses</h2>
    <p class="weakness">Studying</p>
    <p class="weakness">Piano theory</p>

    <p class="badge">Top Hero</p>

    <p class="made-by">Created by Jeswin</p>
    
</body>
</html>
