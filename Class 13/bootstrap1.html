<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Hobby Card!</title>
    <!-- Paste inside <head> -->
<link rel="stylesheet"
  href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

<!-- Paste just before </body> -->
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">
</script>
<style>
    body {
        background-color: burlywood;
    }

    .hobby-card {
        text-align: center;
        border: 2px solid saddlebrown;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
        background-color: sandybrown;
    }
</style>
</head>
<body>
   <h1>Hobby Cards!</h1>
   <div class="container">

        <div class="row">

            <div class="col-12 col-md-6 col-lg-4">

                <div class="hobby-card">

                    <h3>Drawing</h3>

                    <p>I love sketching cars and whatever comes to my mind.</p>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <div class="hobby-card">
                    <h3>Chess</h3>
                    <p>I love playing chess with my friends who are as good as me.</p>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <div class="hobby-card">
                    <h3>Writing stories</h3>
                    <p>I like to create stories unimaginable and with a twist.</p>
                </div>
            </div>
            
        </div>
    </div>

</body>
</html>
