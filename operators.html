<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operators</title>
</head>
<body>
    <h1>operators</h1>
    <div id="result"></div>
    <div id="result1"></div>
    <div id="result2"></div>
    <div id="result3"></div>
    <div id="result4"></div>

    <script>
        var a = 123
        var b = 41
        var s = a + b
        var d = a - b
        var p = a * b
        var f = a / b
        var r = a % b
        document.getElementById("result").innerHTML = "The sum is " +s
        document.getElementById("result1").innerHTML = "The difference is " +d
        document.getElementById("result2").innerHTML = "The product is " +p
        document.getElementById("result3").innerHTML = "The fraction is " +f
        document.getElementById("result4").innerHTML = "The remainder is " +r
    </script>
</body>
</html>
