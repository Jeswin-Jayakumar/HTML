<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My animal fact-file</title>
    <style>
        body {
            background-color: rgb(225, 68, 66);
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        .fact-file {
            background-color: coral;
            color: rgb(59, 5, 5);
            width: 260px;
            padding: 25px;
            border: 4px solid maroon;
            margin: 50px;
        }
        .animal-name {
            color: aqua;
            font-size: 22px;
        }
        .detail {
            color: rgb(37, 90, 189);
        }
        .cool-fact {
            color: gold;
        }
    </style>
</head>
<body>
    <div class="fact-file">
        <h2 class="animal-name">Snow Leopard</h2>
        <p class="detail">Type:Big Cat</p>
        <p class="detail">Lives in: Mountain ranges of Central Asia</p>
        <p class="detail">Diet: Deer, goats, and wild sheep</p>
        <p class="cool-fact">Cool-Fact: Can leap up to 15 metres in one jump!</p>
    </div>
</body>
</html>
