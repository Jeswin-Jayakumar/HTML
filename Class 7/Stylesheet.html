<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width, initial-scale=1.0">
    <title>Style sheets</title>
    <style>
        /* element selector */
        h2{
            font-size: 34px;
            color: rgb(213, 160, 89)
        }
        /* universal selector */
        *{
            background-color: rgb(155, 128, 95);
        }
        .class1{
            background-color: rgb(73, 51, 21);
        }
        #para1{
            border: 3px solid rgb(106, 93, 73);
        }
    </style>
    <link rel="stylesheet" href="mystyle.css">
</head>
<body>
    <h1 style="color: rgb(214, 242, 242);">Inline style</h1>
    <h2 class ="class1">Internal style</h2>
    <h3 class ="class1">External style</h3>
    <p id="para1">CSS stands for Cascading Style Sheets.
It is a stylesheet language used to describe how HTML elements should be displayed on screen, paper, or other media.</p>
</body>
</html>
