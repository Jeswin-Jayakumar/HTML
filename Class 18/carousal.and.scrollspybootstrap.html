<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Animal Safari</title>
    <link rel="stylesheet"
  href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <style>
    body {position: relative;}
    .safari-slide {height: 300px;text-align: center;padding-top: 75px;font-size: 4rem;color: white;}
    .slide-forest {background-color: darkgreen;}
    .slide-ocean {background-color: steelblue;}
    .slide-dersert {background-color: orange;}
    .section {padding: 70px 20px; min-height: 300px;}
    #forest { background: honeydew;}
    #ocean { background: aliceblue;}
    #desert { background: lightyellow;}
  </style>
</head>
<body data-spy="scroll" data-target="#safariNav" data-offset="60">
    <div id="safariCarousel" class="carousel slide" data-ride="carousel">
        <ol class="carousel-indicators">
            <li data-target="#safariCarousel" data-slide-to="0" class="active"></li>
            <li data-target="#safariCarousel" data-slide-to="1" ></li>
            <li data-target="#safariCarousel" data-slide-to="2" ></li>
        </ol>
        <div class="carousel-inner">
            <div class="carousel-item active safari-slide slide-forest">Forest Safari</div>
            <div class="carousel-item safari-slide slide-ocean">Ocean Safari</div>
            <div class="carousel-item safari-slide slide-desert">Desert Safari</div>
        </div>
        <a class="carousel-control-prev" href="#safariCarousel" data-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </a>
        <a class="carousel-control-next" href="#safariCarousel" data-slide="next">
            <span class="carousel-control-next-icon"></span>
        </a>
    </div>
    <nav id="safariNav" class="navbar navbar-expand-sm navbar-dark bg-dark sticky-top"></nav>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
